name: Deploy Application

on:
  push:
    branches:
      - main
    paths:
      - "app/**"

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: aman-app
  ECS_CLUSTER: aman-app-cluster
  ECS_SERVICE: aman-app-service
  CODEDEPLOY_APP: strapi-codedeploy-app
  CODEDEPLOY_GROUP: strapi-deployment-group
  CONTAINER_NAME: aman-container

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, push Docker image
        run: |
          IMAGE_TAG=${{ github.sha }}
          IMAGE_URI=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG
          docker build -t $IMAGE_URI ./app
          docker push $IMAGE_URI
          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition $ECS_SERVICE \
            --query taskDefinition > task-def.json

      - name: Create new task definition revision
        run: |
          jq --arg IMAGE "$IMAGE_URI" \
            --arg NAME "$CONTAINER_NAME" \
            '.containerDefinitions |= map(
              if .name == $NAME then .image = $IMAGE else . end
            ) 
            | del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.compatibilities,.registeredAt,.registeredBy)' \
            task-def.json > new-task-def.json

          NEW_TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://new-task-def.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "NEW_TASK_DEF_ARN=$NEW_TASK_DEF_ARN" >> $GITHUB_ENV

      - name: Generate AppSpec dynamically
        run: |
          cat <<EOF > appspec-temp.json
          {
            "version": 1,
            "Resources": [
              {
                "TargetService": {
                  "Type": "AWS::ECS::Service",
                  "Properties": {
                    "TaskDefinition": "$NEW_TASK_DEF_ARN",
                    "LoadBalancerInfo": {
                      "ContainerName": "$CONTAINER_NAME",
                      "ContainerPort": 1337
                    }
                  }
                }
              }
            ]
          }
          EOF

      - name: Trigger CodeDeploy deployment
        id: deploy
        run: |
          DEPLOYMENT_ID=$(aws deploy create-deployment \
            --application-name $CODEDEPLOY_APP \
            --deployment-group-name $CODEDEPLOY_GROUP \
            --revision revisionType=AppSpecContent,appSpecContent="{\"content\":\"$(cat appspec-temp.json | sed 's/\"/\\\"/g')\"}" \
            --query deploymentId --output text)

          echo "DEPLOYMENT_ID=$DEPLOYMENT_ID" >> $GITHUB_ENV

      - name: Wait for deployment to finish
        run: |
          aws deploy wait deployment-successful \
            --deployment-id $DEPLOYMENT_ID

      - name: Deployment successful
        run: echo "Blue/Green deployment completed successfully 🚀"