name: Terraform Infrastructure

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Choose terraform action: plan or apply"
        required: true
        default: "plan"

env:
  AWS_REGION: us-east-1

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        if: github.event.inputs.action == 'plan'
        run: terraform plan

      - name: Import existing resources if they exist
        run: |
         echo "Trying to import existing resources..."

          # Import RDS Subnet Group (if exists)
           terraform import module.rds.aws_db_subnet_group.strapi_db_subnet_group aman-db-subnet-group || true

          # Import ALB Security Group (replace with real SG ID if needed)
          SG_ID=$(aws ec2 describe-security-groups \
          --filters Name=group-name,Values=alb-sg Name=vpc-id,Values=vpc-0778ad9a2069279fc \
          --query "SecurityGroups[0].GroupId" \
          --output text 2>/dev/null)

           if [ "$SG_ID" != "None" ] && [ -n "$SG_ID" ]; then
           terraform import module.security.aws_security_group.alb_sg $SG_ID || true
          fi

      - name: Terraform Apply
        if: github.event.inputs.action == 'apply'
        run: terraform apply -auto-approve
